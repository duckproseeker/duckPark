profile_name: perception_stack
display_name: Perception Stack
description: 参考 CARLA leaderboard agent 的感知栈配置，包含 RGB、LiDAR、Radar、GNSS、IMU 和 OpenDRIVE。
metadata:
  source: carla-simulator/leaderboard
  reference: leaderboard/autoagents/dummy_agent.py
  category: official-inspired
sensors:
  - id: Center
    type: sensor.camera.rgb
    x: 0.7
    y: 0.0
    z: 1.6
    roll: 0.0
    pitch: 0.0
    yaw: 0.0
    width: 800
    height: 600
    fov: 100.0
  - id: Left
    type: sensor.camera.rgb
    x: 0.7
    y: -0.4
    z: 1.6
    roll: 0.0
    pitch: 0.0
    yaw: -45.0
    width: 800
    height: 600
    fov: 100.0
  - id: Right
    type: sensor.camera.rgb
    x: 0.7
    y: 0.4
    z: 1.6
    roll: 0.0
    pitch: 0.0
    yaw: 45.0
    width: 800
    height: 600
    fov: 100.0
  - id: LIDAR
    type: sensor.lidar.ray_cast
    x: 0.7
    y: -0.4
    z: 1.6
    roll: 0.0
    pitch: 0.0
    yaw: -45.0
    channels: 64
    range: 85.0
    points_per_second: 600000
    rotation_frequency: 10.0
  - id: RADAR
    type: sensor.other.radar
    x: 0.7
    y: -0.4
    z: 1.6
    roll: 0.0
    pitch: 0.0
    yaw: -45.0
    horizontal_fov: 30.0
    vertical_fov: 30.0
    range: 100.0
  - id: GPS
    type: sensor.other.gnss
    x: 0.7
    y: -0.4
    z: 1.6
  - id: IMU
    type: sensor.other.imu
    x: 0.7
    y: -0.4
    z: 1.6
    roll: 0.0
    pitch: 0.0
    yaw: -45.0
  - id: OpenDRIVE
    type: sensor.opendrive_map
    reading_frequency: 20.0
