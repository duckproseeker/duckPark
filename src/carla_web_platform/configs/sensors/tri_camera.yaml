    type: sensor.camera.rgb
    x: 1.5
    y: -0.35
    z: 1.7
    yaw: -45.0
    pitch: 0.0
    roll: 0.0
    width: 1280
    height: 720
    fov: 100.0
  - id: FrontRight
    type: sensor.camera.rgb
    x: 1.5
    y: 0.35
    z: 1.7
    yaw: 45.0
    pitch: 0.0
    roll: 0.0
    width: 1280
    height: 720
    fov: 100.0
